<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>code-sim · wireframes</title>
<style>
  html, body { margin:0; padding:0; height:100%; background:#0d1014; }
  body { font-family: "JetBrains Mono", monospace; color:#8a9097; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="sketches/sd-helpers.jsx?v=4"></script>
<script type="text/babel" src="sketches/sketch-A-v2.jsx?v=7"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "showLabels": true,
  "showRoads": true,
  "showWeather": true
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const wrapStyle = {
    '--show-labels': tweaks.showLabels ? 'inline' : 'none',
    '--show-roads':  tweaks.showRoads  ? 'inline' : 'none',
    filter: tweaks.showWeather ? 'none' : 'saturate(0.6) brightness(0.95)',
  };

  return (
    <div style={wrapStyle}>
      <DesignCanvas>
        <DCSection id="hero" title="code-sim · agentic city"
          subtitle="solarized dark · isometric · agents in motion">
          <DCArtboard id="A" label="A · isometric city (action on-screen)" width={1100} height={680}>
            <SketchAv2/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="display">
          <TweakToggle label="building labels" value={tweaks.showLabels}
            onChange={(v) => setTweak('showLabels', v)}/>
          <TweakToggle label="dependency roads" value={tweaks.showRoads}
            onChange={(v) => setTweak('showRoads', v)}/>
          <TweakToggle label="weather / ambient tint" value={tweaks.showWeather}
            onChange={(v) => setTweak('showWeather', v)}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
